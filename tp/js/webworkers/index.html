<!DOCTYPE html>
<html>
    <head>
        <title>My website</title>
    </head>
    <body>
        <div id="main">
            <p>Hello world</p>
        </div>
        
    </body>
    <script>

            if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/tp/js/webworkers/exemple.js', { scope: '/tp/js/webworkers/' }).then(function(reg) {
                // registration worked
                console.log('Registration succeeded. Scope is ' + reg.scope);
            }).catch(function(error) {
                // registration failed
                console.log('Registration failed with ' + error);
            });
            };
            this.addEventListener("install", function(event) {
            // Ici on utilise waitUntil qui attends une promesse pour valider l'installation
            event.waitUntil(
            caches.open("mon-site-cache-v1").then(function(cache) {
                // On met en cache une liste d'URLs qui sont la fondation de notre app.
                console.log("ok")
                return cache.addAll([
                    "https://cors-anywhere.herokuapp.com/https://planning.univ-rennes1.fr/jsp/custom/modules/plannings/9EYlGR3a.shu",
                ]);
             })
            );
            });
        



            self.addEventListener('fetch', function(event) {
                event.respondWith(caches.match(event.request).then(function(response) {
                    // caches.match() always resolves
                    // but in case of success response will have value
                    if (response !== undefined) {
                    return response;
                    } else {
                    return fetch(event.request).then(function (response) {
                        // response may be used only once
                        // we need to save clone to put one copy in cache
                        // and serve second one
                        let responseClone = response.clone();
                        
                        caches.open('v1').then(function (cache) {
                        cache.put(event.request, responseClone);
                        });
                        return response;
                    }).catch(function () {
                        return caches.match('/sw-test/gallery/myLittleVader.jpg');
                    });
                    }
                }));
            });
    </script>
</html>

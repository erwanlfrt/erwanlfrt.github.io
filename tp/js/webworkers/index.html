<!DOCTYPE html>
<html>
    <head>
        <title>My website</title>
    </head>
    <body>
        <div id="main">
            <p>Hello world</p>
        </div>
        
    </body>
    <script>

            if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/webworkers/exemple.js', { scope: '/webworkers/' }).then(function(reg) {
                // registration worked
                console.log('Registration succeeded. Scope is ' + reg.scope);
            }).catch(function(error) {
                // registration failed
                console.log('Registration failed with ' + error);
            });
            };

    </script>
</html>
